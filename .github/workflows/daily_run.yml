name: Daily Natural Gradient Allocation

on:
  schedule:
    - cron: '0 02 * * 1-5'   # Weekdays at 23:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run natural gradient allocation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python trainer.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: natural-gradient-results
          path: results/
